[options]
DBPath = /usr/lib/pacman
Architecture = auto
Color
HoldPkg = pacman glibc
CheckSpace
ParallelDownloads = 5
DownloadUser = alpm
SigLevel = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch

[extra]
Server = https://fastly.mirror.pkgbuild.com/$repo/os/$arch
